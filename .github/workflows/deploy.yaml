name: deploy to ec2
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: deploy via ssh
        uses: appleboy/ssh-action@v1
        with:
         host: ${{ secrets.HOST }}
         username: ubuntu
         key: ${{ secrets.KEY }}
         script: |
           cd ~/level6
           git pull
           sudo docker compose down
           sudo docker compose up -d --build
